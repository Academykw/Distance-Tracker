name: distance_tracker
description: "GPS-based distance tracker for walking, jogging, and running. Displays distance accurately in metres, kilometres, and miles using the Haversine formula."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1


  # Navigation
  go_router: ^13.2.1

  # Storage
  shared_preferences: ^2.2.3

  # GPS & location
  geolocator: ^11.1.0

  # Maps (OpenStreetMap — no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local database
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Background service (keeps GPS alive when app is minimised)
  flutter_background_service: ^5.0.5

  # Charts for history screen
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.4.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
